<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Página para escribir un comentario</title>
    <style>
        img {
            width: 50%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Escribir un comentario para {{ camera.name }}</h1>
    <p>Ubicación: {{ camera.latitude }}, {{ camera.longitude }}</p>
    {% if camera.img_camera %}
            <img src="{{ camera.img_camera }}" alt="Imagen de la cámara">
        {% else %}
            <p>No hay imagen disponible</p>
        {% endif %}
    <p>Fecha y hora actuales: {{ current_date }}</p>
    <form action="" method="POST">
        <label for="comment_text">Comentario:</label>
        <input type="hidden" name="id_camera" value="{{ camera.id }}">
        <input type="text" name="comment_text" id="comment_text" maxlength="200" required>
        <input type="submit" value="Enviar comentario">
    </form>

</body>
</html>
