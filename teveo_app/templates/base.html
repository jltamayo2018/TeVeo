{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}TeVeO{% endblock %}</title>
        <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        <script src="{% static 'js/bootstrap.bundle.js' %}"></script>
    </head>

    <body>
        <header class="cabecera">
            <img src="{% static 'images/header.png' %}" alt="logo">
            <a href="{% url 'index' %}">TeVeO</a>
            <span>{{ user.username|default:"Anónimo" }}</span>
        </header>

        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <a href="{% url 'index' %}">Principal</a>
            <a href="{% url 'camaras' %}">Cámaras</a>
            <a href="{% url 'settings' %}">Configuración</a>
            <a href="{% url 'help' %}">Ayuda</a>
            <a href="{% url 'admin:index' %}">Admin</a>
        </nav>

        {% block content %}
        {% endblock %}

        <footer>
            <p>Cámaras: {{ total_cameras }}. Comentarios: {{ total_comments }}</p>
        </footer>
    </body>
</html>
